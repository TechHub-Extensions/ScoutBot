name: ScoutBot — Daily Scrape

# Runs the scrape + cleanup pipeline every day at 08:00 WAT (07:00 UTC).
# Does NOT send the email digest — that runs separately on Sundays.
# This keeps the Google Sheet fresh throughout the week.

on:
  schedule:
    - cron: '0 7 * * *'    # 08:00 WAT daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google service account JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > service_account.json

      - name: Build .env file from secrets
        run: |
          cat > .env <<EOF
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          FORM_SHEET_ID=1dFcnVvQjWkuYhN1rplICTY0j88KgvGqQ3FzYId2ru4s
          GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json
          RECIPIENT_EMAILS=${{ secrets.RECIPIENT_EMAILS }}
          EOF

      - name: Scrape new opportunities + cleanup expired rows
        run: python run.py --scrape && python run.py --cleanup

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs
          path: |
            scoutbot.log
            scrapy.log
          if-no-files-found: ignore
          retention-days: 7
