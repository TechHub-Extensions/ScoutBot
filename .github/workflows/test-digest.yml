name: ScoutBot — Test Digest (Single Recipient)

# Triggered manually only — sends the weekly digest to one address for testing.
# Delete this file after the test is confirmed.

on:
  workflow_dispatch:

jobs:
  test-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google service account JSON
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SA_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          if [ -n "$SA_JSON_B64" ]; then
            echo "$SA_JSON_B64" | base64 -d > service_account.json
          elif [ -n "$SA_JSON" ]; then
            printf '%s' "$SA_JSON" > service_account.json
          else
            echo "ERROR: No service account secret set." >&2; exit 1
          fi
          python -c "import json; json.load(open('service_account.json')); print('service_account.json valid.')"

      - name: Build .env for test (single recipient only)
        run: |
          cat > .env <<EOF
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          FORM_SHEET_ID=1dFcnVvQjWkuYhN1rplICTY0j88KgvGqQ3FzYId2ru4s
          GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json
          RECIPIENT_EMAILS=kamsirichard1960@gmail.com
          EOF

      - name: Send test digest to kamsirichard1960@gmail.com
        run: python run.py --notify

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-digest-logs
          path: scoutbot.log
          if-no-files-found: ignore
          retention-days: 3
