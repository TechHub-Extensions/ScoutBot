name: ScoutBot — Monthly Admin Report

# Sends a stats summary to the project lead on the 1st of each month.
# Covers: new opportunities, subscriber count, bounces, category breakdown.
# Run at 07:30 WAT (06:30 UTC) — after the daily scrape has already run at 07:00 WAT.

on:
  schedule:
    - cron: '30 6 1 * *'   # 07:30 WAT on the 1st of every month
  workflow_dispatch:        # Can also be triggered manually from Actions tab

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google service account JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > service_account.json

      - name: Build .env file from secrets
        run: |
          cat > .env <<EOF
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          FORM_SHEET_ID=1dFcnVvQjWkuYhN1rplICTY0j88KgvGqQ3FzYId2ru4s
          GOOGLE_SERVICE_ACCOUNT_JSON=service_account.json
          ADMIN_EMAIL=kamsirichard1960@gmail.com
          EOF

      - name: Send monthly admin report
        run: python admin_report.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-report-logs
          path: scoutbot.log
          if-no-files-found: ignore
          retention-days: 14
